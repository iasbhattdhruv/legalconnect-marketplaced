{% extends 'base.html' %}

{% block content %}

<div class="max-w-3xl mx-auto mt-16 bg-white p-10 rounded-2xl shadow-lg">

    <h2 class="text-3xl font-bold mb-6">
        Book Appointment with {{ lawyer.user.username }}
    </h2>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-4">
            <label class="block mb-2 font-semibold">Select Date</label>
            <input type="date" name="date"
                   class="w-full border px-4 py-2 rounded-lg"
                   required>
        </div>

        <div class="mb-4">
            <label class="block mb-2 font-semibold">Select Time</label>
            <input type="time" name="time"
                   class="w-full border px-4 py-2 rounded-lg"
                   required>
        </div>

        <div class="mb-6">
            <label class="block mb-2 font-semibold">Message</label>
            <textarea name="message"
                      class="w-full border px-4 py-2 rounded-lg"
                      rows="4"
                      placeholder="Describe your legal issue..."
                      required></textarea>
        </div>

        <button type="submit"
                class="bg-blue-600 text-white px-6 py-3 rounded-lg">
            Confirm Booking
        </button>

    </form>

</div>

{% endblock %}
