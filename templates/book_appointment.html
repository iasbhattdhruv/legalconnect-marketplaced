{% extends 'base.html' %}

{% block content %}

<div class="max-w-3xl mx-auto">

    <div class="bg-gray-900 p-10 rounded-3xl shadow-xl">

        <!-- HEADER -->
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold">
                Book Appointment
            </h2>
            <p class="text-gray-400">
                With {{ lawyer.user.username }}
            </p>
        </div>

        <!-- ERROR / SUCCESS MESSAGES -->
        {% if messages %}
            {% for message in messages %}
                <div class="mb-4 p-3 rounded-xl 
                    {% if message.tags == 'error' %}bg-red-500{% else %}bg-green-500{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <!-- FORM -->
        <form method="POST" class="space-y-6">

            {% csrf_token %}

            <!-- DATE -->
            <div>
                <label class="block mb-2 font-semibold">Select Date</label>
                <input type="date" name="date" required min="{{ today }}"
                       class="w-full bg-gray-800 border border-gray-700 px-4 py-3 rounded-xl focus:outline-none">
            </div>

            <!-- TIME -->
            <div>
                <label class="block mb-2 font-semibold">Select Time</label>
                <input type="time" name="time" required
                       class="w-full bg-gray-800 border border-gray-700 px-4 py-3 rounded-xl focus:outline-none">
            </div>

            <!-- MESSAGE -->
            <div>
                <label class="block mb-2 font-semibold">Describe Your Issue</label>
                <textarea name="message" rows="4"
                          class="w-full bg-gray-800 border border-gray-700 px-4 py-3 rounded-xl focus:outline-none"
                          placeholder="Explain your legal issue..."></textarea>
            </div>

            <!-- SUBMIT -->
            <button type="submit"
                    class="w-full bg-blue-600 py-3 rounded-xl hover:bg-blue-700 text-lg font-semibold">
                Confirm Booking
            </button>

        </form>

    </div>

</div>

{% endblock %}
