{% extends 'base.html' %}

{% block content %}

<div class="max-w-4xl mx-auto py-16 px-6">

    <div class="bg-white p-10 rounded-2xl shadow-lg">

        <h2 class="text-3xl font-bold mb-4">
            {{ lawyer.user.username }}
        </h2>

        <p class="mb-2">
            <strong>Specialization:</strong> {{ lawyer.specialization }}
        </p>

        <p class="mb-6">
            <strong>Experience:</strong> {{ lawyer.experience }} years
        </p>

        {% if user.is_authenticated and profile.user_type == 'client' %}
            <a href="/book/{{ lawyer.id }}/"
               class="bg-blue-600 text-white px-6 py-2 rounded-lg">
                Book Consultation
            </a>
        {% endif %}

    </div>

</div>

{% endblock %}
