{% extends 'base.html' %}

{% block content %}

<div class="max-w-2xl mx-auto py-16 px-6">

```
<div class="bg-white p-10 rounded-3xl shadow-xl">

    <h2 class="text-3xl font-bold mb-8 text-center">
        Create Account
    </h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <!-- Username -->
        <div class="mb-4">
            <label class="block mb-2 font-semibold">Username</label>
            <input type="text" name="username" required
                   class="w-full border px-4 py-2 rounded-xl">
        </div>

        <!-- Email -->
        <div class="mb-4">
            <label class="block mb-2 font-semibold">Email</label>
            <input type="email" name="email" required
                   class="w-full border px-4 py-2 rounded-xl">
        </div>

        <!-- Password -->
        <div class="mb-4">
            <label class="block mb-2 font-semibold">Password</label>
            <input type="password" name="password" required
                   class="w-full border px-4 py-2 rounded-xl">
        </div>

        <!-- User Type -->
        <div class="mb-4">
            <label class="block mb-2 font-semibold">Register As</label>
            <select name="user_type" required
                    class="w-full border px-4 py-2 rounded-xl">
                <option value="client">Client</option>
                <option value="lawyer">Lawyer</option>
            </select>
        </div>

        <!-- Gender -->
        <div class="mb-4">
            <label class="block mb-2 font-semibold">Gender</label>
            <select name="gender"
                    class="w-full border px-4 py-2 rounded-xl">
                <option value="">Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
            </select>
        </div>

        <!-- Birthdate -->
        <div class="mb-4">
            <label class="block mb-2 font-semibold">Birthdate</label>
            <input type="date" name="birthdate"
                   class="w-full border px-4 py-2 rounded-xl">
        </div>

        <!-- Profession -->
        <div class="mb-4">
            <label class="block mb-2 font-semibold">Profession</label>
            <input type="text" name="profession"
                   class="w-full border px-4 py-2 rounded-xl">
        </div>

        <!-- Passport Photo -->
        <div class="mb-4">
            <label class="block mb-2 font-semibold">
                Passport Size Photo (Optional)
            </label>
            <input type="file" name="photo"
                   class="w-full border px-4 py-2 rounded-xl">
        </div>

        <!-- Signature -->
        <div class="mb-6">
            <label class="block mb-2 font-semibold">
                Signature (Optional)
            </label>
            <input type="file" name="signature"
                   class="w-full border px-4 py-2 rounded-xl">
        </div>

        <button type="submit"
                class="w-full bg-blue-600 text-white py-3 rounded-xl hover:bg-blue-700">
            Register
        </button>

    </form>

</div>
```

</div>

{% endblock %}
