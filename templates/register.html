{% extends 'base.html' %}

{% block content %}

<div class="flex justify-center items-center min-h-screen">
    <div class="bg-white p-10 rounded-2xl shadow-xl w-96">

        <h2 class="text-3xl font-bold mb-6 text-center">Create Account</h2>

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="username"
                   placeholder="Username"
                   class="w-full mb-4 px-4 py-2 border rounded-lg"
                   required>

            <input type="email" name="email"
                   placeholder="Email"
                   class="w-full mb-4 px-4 py-2 border rounded-lg"
                   required>

            <input type="password" name="password"
                   placeholder="Password"
                   class="w-full mb-4 px-4 py-2 border rounded-lg"
                   required>

            <select name="user_type"
                    class="w-full mb-6 px-4 py-2 border rounded-lg"
                    required>
                <option value="">Select User Type</option>
                <option value="client">Client</option>
                <option value="lawyer">Lawyer</option>
            </select>

            <button type="submit"
                    class="w-full bg-blue-600 text-white py-2 rounded-lg">
                Register
            </button>
        </form>

    </div>
</div>

{% endblock %}
