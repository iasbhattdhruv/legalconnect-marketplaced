{% extends 'base.html' %}

{% block content %}

<div class="flex justify-center items-center min-h-screen">
    <div class="bg-white p-10 rounded-2xl shadow-xl w-96">
        <h2 class="text-3xl font-bold mb-6 text-center">Register</h2>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit"
                    class="w-full bg-blue-600 text-white py-2 rounded-lg mt-4">
                Create Account
            </button>
        </form>
    </div>
</div>

{% endblock %}
