{% extends 'base.html' %}

{% block content %}

<div class="max-w-xl mx-auto py-16">

<div class="bg-white p-8 rounded-xl shadow">

<h2 class="text-2xl font-bold mb-6">
Add Meeting Link
</h2>

<form method="POST">

{% csrf_token %}

<input type="url"
       name="meeting_link"
       placeholder="Paste Zoom / Google Meet link"
       required
       class="w-full border px-4 py-3 rounded mb-6">

<button class="bg-blue-600 text-white px-6 py-3 rounded">
Save Meeting Link
</button>

</form>

</div>

</div>

{% endblock %}
