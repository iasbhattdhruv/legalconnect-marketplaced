<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LegalConnect</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-950 text-white">

    <!-- NAVBAR -->
    <nav class="bg-gray-900 border-b border-gray-800 px-8 py-4 flex justify-between items-center">

        <h1 class="text-2xl font-bold text-blue-500">
            ⚖ LegalConnect
        </h1>

        <div class="space-x-6">
            <a href="/" class="hover:text-blue-400">Home</a>
            <a href="/dashboard/" class="hover:text-blue-400">Dashboard</a>
            <a href="/lawyers/" class="hover:text-blue-400">Find Lawyers</a>
            <a href="/legal-ai/" class="hover:text-blue-400">AI Assistant</a>
            <a href="/logout/" class="text-red-400 hover:text-red-500">Logout</a>
        </div>

    </nav>

    <!-- MAIN CONTENT -->
    <div class="min-h-screen px-6 py-10">

        {% if messages %}
            {% for message in messages %}
                <div class="mb-4 p-4 rounded-xl bg-blue-600">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}

    </div>

</body>
</html>
